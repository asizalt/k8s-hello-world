name: Helm Lint

on:
  push:
    paths:
      - 'helm/**'
  pull_request:
    paths:
      - 'helm/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.15.0'

      - name: Lint Helm chart
        run: helm lint helm/hello-app/

      - name: Render templates (dry-run)
        run: helm template hello-app helm/hello-app/ --values helm/hello-app/values.yaml
