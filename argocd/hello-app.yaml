apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/asizalt/k8s-hello-world   # <-- replace with your repo URL
    targetRevision: main
    path: helm/hello-app
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: hello-app
  syncPolicy:
    automated:
      prune: true       # delete K8s resources removed from Git
      selfHeal: true    # revert manual changes made directly to the cluster
    syncOptions:
      - CreateNamespace=true   # create the hello-app namespace if it doesn't exist
